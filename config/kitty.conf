# ══════════════════════════════════════════════════════════════════
#  K I T T Y   C O N F I G  —  NEON EDITION
#  Arch Linux / KDE Wayland
# ══════════════════════════════════════════════════════════════════

# ─── FONT ────────────────────────────────────────────────────────
# Install: sudo pacman -S ttf-jetbrains-mono-nerd
font_family      JetBrainsMono Nerd Font Mono
bold_font        JetBrainsMono Nerd Font Mono Bold
italic_font      JetBrainsMono Nerd Font Mono Italic
bold_italic_font JetBrainsMono Nerd Font Mono Bold Italic
font_size        11.0

# Ligatures — looks stunning in code
disable_ligatures never
font_features JetBrainsMonoNFM-Regular +liga +calt +ss01 +ss02 +ss19 +ss20

# Fallback for Nerd Font symbols / powerline glyphs
symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E00A Symbols Nerd Font Mono
symbol_map U+E0A0-U+E0A3,U+E0B0-U+E0C8,U+E0CC-U+E0D4      Symbols Nerd Font Mono
symbol_map U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B1       Symbols Nerd Font Mono
symbol_map U+E700-U+E7C5,U+F000-U+F2E0,U+F300-U+F32F       Symbols Nerd Font Mono
symbol_map U+F400-U+F532,U+F500-U+FD46,U+F0001-U+F1AF0     Symbols Nerd Font Mono

# ─── CURSOR — LIGHTNING TRAIL EFFECT ────────────────────────────
cursor_shape     beam
cursor_beam_thickness 1.8

# Cursor blink
cursor_blink_interval  0.4
cursor_stop_blinking_after 8.0

# ⚡ CURSOR TRAIL — lightning bolt effect as cursor moves
cursor_trail 0
cursor_trail_decay 0.01 0.5
cursor_trail_start_threshold 2
# Electric cyan trail color
cursor_trail_color #00FFFF

# Cursor color (bright electric)
cursor #00FFFF
cursor_text_color background

# ─── SCROLLBACK ─────────────────────────────────────────────────
scrollback_lines 20000
scrollback_fill_enlarged_window no
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 5.0

# ─── MOUSE / URL / HYPERLINK FIXES ──────────────────────────────
mouse_hide_wait 2.0

# URL detection
detect_urls yes
url_prefixes https http file ftp ftps gemini irc gopher mailto news git
url_style curly
url_color #8BE9FD

# Open URLs with system default (xdg-open → Zen browser on this system)
open_url_with default

# ✅ FIX: Ctrl+Click opens hyperlinks (was ctrl+shift+click by default)
mouse_map ctrl+left release grabbed,ungrabbed mouse_handle_click link
mouse_map ctrl+left press grabbed discard_event

# Right click → floating GTK4 popup context menu at cursor position
mouse_map right press ungrabbed launch --type=background bash /home/adj/.config/kitty/context_menu_launch.sh

# Copy on select (already had this)
copy_on_select yes

# ─── VISUAL BELL (flash instead of sound) ───────────────────────
enable_audio_bell no
visual_bell_duration 0.15
visual_bell_color #FF79C6

# ─── PERFORMANCE (GPU-accelerated) ──────────────────────────────
repaint_delay 8
input_delay   2
sync_to_monitor yes

# ─── SESSION RESTORE ─────────────────────────────────────────────
# Restore last session (tab titles, order, cwds) on every startup
startup_session /home/adj/.config/kitty/last_session.conf

# ─── WINDOW ─────────────────────────────────────────────────────
remember_window_size   yes
initial_window_width   1400
initial_window_height  900
window_padding_width   10
placement_strategy     center
resize_in_steps        yes
confirm_os_window_close 0

# Window borders
draw_minimal_borders yes
window_border_width  1.5pt
active_border_color   #BD93F9
inactive_border_color #3D3F4E
bell_border_color     #FF5555

# ─── BACKGROUND / TRANSPARENCY ───────────────────────────────────
# KDE KWin handles blur — enable "Blur" window effect in KDE Settings
# System Settings → Workspace Behavior → Desktop Effects → Blur
background_opacity 1.0

# ─── COLORS — Dracula Pro ────────────────────────────────────────
foreground            #F8F8F2
background            #1E1F29
selection_foreground  #FFFFFF
selection_background  #44475A

# Black
color0  #21222C
color8  #6272A4
# Red
color1  #FF5555
color9  #FF6E6E
# Green
color2  #50FA7B
color10 #69FF94
# Yellow
color3  #F1FA8C
color11 #FFFFA5
# Blue
color4  #BD93F9
color12 #D6ACFF
# Magenta
color5  #FF79C6
color13 #FF92DF
# Cyan
color6  #8BE9FD
color14 #A4FFFF
# White
color7  #F8F8F2
color15 #FFFFFF

# ─── TAB BAR — Powerline slanted style ───────────────────────────
tab_bar_edge             bottom
tab_bar_style            custom
tab_powerline_style      slanted
tab_bar_min_tabs         1
tab_bar_align            left
tab_title_template       " {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title[:20]} "
active_tab_foreground    #F8F8F2
active_tab_background    #BD93F9
active_tab_font_style    bold
inactive_tab_foreground  #6272A4
inactive_tab_background  #21222C
inactive_tab_font_style  normal
tab_bar_background       #1E1F29
tab_bar_margin_color     #1E1F29

# ─── LAYOUTS ────────────────────────────────────────────────────
enabled_layouts tall,fat,grid,horizontal,vertical,stack

# ─── SHELL INTEGRATION (cwd tracking, prompt navigation) ────────
shell_integration enabled

# ─── REMOTE CONTROL ─────────────────────────────────────────────
allow_remote_control yes
listen_on unix:@kitty-{kitty_pid}

# ─── KEYBOARD SHORTCUTS ─────────────────────────────────────────

# --- Tabs ---
map ctrl+shift+i   set_tab_title
map ctrl+t         new_tab_with_cwd
map ctrl+shift+t   new_tab_with_cwd
map ctrl+tab       next_tab
map ctrl+shift+tab previous_tab
map ctrl+w         close_tab
map ctrl+alt+1     goto_tab 1
map ctrl+alt+2     goto_tab 2
map ctrl+alt+3     goto_tab 3
map ctrl+alt+4     goto_tab 4
map ctrl+alt+5     goto_tab 5
map ctrl+alt+6     goto_tab 6
map ctrl+shift+,   move_tab_backward
map ctrl+shift+.   move_tab_forward

# --- Windows (panes) ---
# ctrl+shift+enter → paste from clipboard (like many GUI apps)
map ctrl+shift+enter paste_from_clipboard
# New window in same directory
map ctrl+alt+enter   new_window_with_cwd
map ctrl+shift+w     close_window
map ctrl+shift+]     next_window
map ctrl+shift+[     previous_window
map ctrl+shift+f     move_window_forward
map ctrl+shift+b     move_window_backward

# Window splits
map ctrl+shift+alt+v launch --cwd=current --location=vsplit
map ctrl+shift+alt+h launch --cwd=current --location=hsplit

# Resize windows
map ctrl+shift+left  resize_window narrower 5
map ctrl+shift+right resize_window wider 5
map ctrl+shift+up    resize_window taller 2
map ctrl+shift+down  resize_window shorter 2
map ctrl+shift+home  resize_window reset

# --- Layouts ---
map ctrl+alt+t goto_layout tall
map ctrl+alt+s goto_layout stack
map ctrl+alt+g goto_layout grid
map ctrl+alt+h goto_layout horizontal
map ctrl+alt+v goto_layout vertical
map ctrl+alt+z toggle_layout stack

# Fullscreen / maximize
map ctrl+shift+F11  toggle_fullscreen
map ctrl+shift+F10  toggle_maximized

# --- URL / File / Hyperlink pickers ---
# ✅ Open URL picker (keyboard: shows all clickable URLs)
map ctrl+shift+e open_url_with_hints
# Pick file path from scrollback and open with default app
map ctrl+shift+p>f kitten hints --type path --program default
# Pick file path and insert into command line
map ctrl+shift+p>i kitten hints --type path --program @
# Pick a word
map ctrl+shift+p>w kitten hints --type word --program @
# Pick a line
map ctrl+shift+p>l kitten hints --type line --program @
# Pick git hash
map ctrl+shift+p>h kitten hints --type hash --program @

# --- Font size ---
map ctrl+equal    change_font_size all +1.0
map ctrl+plus     change_font_size all +1.0
map ctrl+minus    change_font_size all -1.0
map ctrl+0        change_font_size all 0

# --- Clipboard ---
map ctrl+shift+c  copy_to_clipboard
map ctrl+shift+v  paste_from_clipboard

# --- Scrollback navigation ---
map ctrl+shift+up      scroll_line_up
map ctrl+shift+down    scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home    scroll_home
map ctrl+shift+end     scroll_end
# Jump between shell prompts (requires shell_integration enabled)
map ctrl+shift+z  scroll_to_prompt -1
map ctrl+shift+x  scroll_to_prompt 1

# --- Misc ---
map ctrl+shift+F5  load_config_file
# Debug test — press ctrl+F12 to check if launch works
map ctrl+F12 launch --type=background bash -c 'echo TEST_OK_$(date) >> /tmp/kitty_test.log'
map ctrl+shift+F6  debug_config
map ctrl+shift+u   kitten unicode_input
map ctrl+shift+F2  edit_config_file

# --- File manager (yazi) — install: sudo pacman -S yazi ---
map ctrl+shift+y launch --cwd=current --type=window yazi

# --- Image viewer (icat kitten) ---
# Usage from command line: kitty +kitten icat image.png

# ─── CLAUDE BOARD — native Kitty 4-pane grid ────────────────
map ctrl+alt+0 launch --type=background bash /home/adj/.config/kitty/claude_board.sh


# ─── HOTKEY PANEL — F1 to open/close ──────────────────────────
map F1 launch --type=overlay --title=" Kitty Hotkeys" bash /home/adj/.config/kitty/show_hotkeys.sh

# ─── MAGIC DUST — particle effects on keypress ─────────────────
map ctrl+F9  launch --type=background bash -c '/usr/bin/python3 /home/adj/.config/kitty/magic_dust.py >>/tmp/magic_dust.log 2>&1'
map ctrl+F10 launch --type=background pkill -f magic_dust.py

# ─── WEATHER EFFECTS — ambient overlays ────────────────────────
# Ctrl+F7 = snow toggle   Ctrl+F8 = rain toggle
map ctrl+F7 launch --type=background bash -c '/usr/bin/python3 /home/adj/.config/kitty/weather.py snow >>/tmp/weather.log 2>&1'
map ctrl+F8 launch --type=background bash -c '/usr/bin/python3 /home/adj/.config/kitty/weather.py rain >>/tmp/weather.log 2>&1'
# Stop everything
map ctrl+F6 launch --type=background bash -c 'pkill -f "weather.py" ; pkill -f "magic_dust.py"'

# ─── RUSSIAN ЙЦУКЕН LAYOUT — shortcuts independent of keyboard layout ───
# Physical key → Cyrillic keysym when Russian layout is active.
# Both lowercase and uppercase mapped: Wayland compositors differ on
# what ctrl+shift delivers (some send uppercase keysym, some lowercase).

# ctrl+t / ctrl+shift+t → new tab  (physical T → е)
map ctrl+е         new_tab_with_cwd
map ctrl+shift+е   new_tab_with_cwd
map ctrl+shift+Е   new_tab_with_cwd

# ctrl+w → close tab  (physical W → ц)
map ctrl+ц         close_tab
# ctrl+shift+w → close window  (physical W → ц)
map ctrl+shift+ц   close_window
map ctrl+shift+Ц   close_window

# ctrl+shift+c → copy  (physical C → с)
map ctrl+shift+с   copy_to_clipboard
map ctrl+shift+С   copy_to_clipboard

# ctrl+shift+v → paste  (physical V → м)
map ctrl+shift+м   paste_from_clipboard
map ctrl+shift+М   paste_from_clipboard

# ctrl+shift+e → URL hints  (physical E → у)
map ctrl+shift+у   open_url_with_hints
map ctrl+shift+У   open_url_with_hints

# ctrl+shift+] → next_window  (physical ] → ъ)
map ctrl+shift+ъ   next_window
map ctrl+shift+Ъ   next_window

# ctrl+shift+[ → previous_window  (physical [ → х)
map ctrl+shift+х   previous_window
map ctrl+shift+Х   previous_window

# ctrl+shift+, → move_tab_backward  (physical , → б)
map ctrl+shift+б   move_tab_backward
map ctrl+shift+Б   move_tab_backward

# ctrl+shift+. → move_tab_forward  (physical . → ю)
map ctrl+shift+ю   move_tab_forward
map ctrl+shift+Ю   move_tab_forward

# ctrl+shift+b → move_window_backward  (physical B → и)
map ctrl+shift+и   move_window_backward
map ctrl+shift+И   move_window_backward

# ctrl+shift+f → move_window_forward  (physical F → а)
map ctrl+shift+а   move_window_forward
map ctrl+shift+А   move_window_forward

# ctrl+shift+z → scroll_to_prompt -1  (physical Z → я)
map ctrl+shift+я   scroll_to_prompt -1
map ctrl+shift+Я   scroll_to_prompt -1

# ctrl+shift+x → scroll_to_prompt 1  (physical X → ч)
map ctrl+shift+ч   scroll_to_prompt 1
map ctrl+shift+Ч   scroll_to_prompt 1

# ctrl+shift+u → unicode input  (physical U → г)
map ctrl+shift+г   kitten unicode_input
map ctrl+shift+Г   kitten unicode_input

# ctrl+shift+y → yazi  (physical Y → н)
map ctrl+shift+н   launch --cwd=current --type=window yazi
map ctrl+shift+Н   launch --cwd=current --type=window yazi

# ctrl+shift+i → set tab title  (physical I → ш)
map ctrl+shift+ш   set_tab_title
map ctrl+shift+Ш   set_tab_title

# ctrl+shift+p → manually save session  (physical P → з)
map ctrl+shift+з   launch --type=background python3 /home/adj/.config/kitty/save_session.py
map ctrl+shift+З   launch --type=background python3 /home/adj/.config/kitty/save_session.py

# ctrl+F9 → voice2agent terminal-insert mode
map ctrl+F9   launch --type=background --hold=never /home/adj/.local/bin/v2a-terminal
